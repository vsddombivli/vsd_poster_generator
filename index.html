<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSD Poster Generator</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fdf6e3; font-family: "EB Garamond", serif; min-height: 100vh; padding: 20px 16px; }
  h1 { text-align: center; color: #2d5016; font-size: 1.4rem; margin-bottom: 4px; }
  .sub { text-align: center; color: #7a6a50; font-size: 0.85rem; font-style: italic; margin-bottom: 20px; }

  /* Mode selector */
  .mode-btns { display: flex; gap: 12px; max-width: 500px; margin: 0 auto 24px; }
  .mode-btn {
    flex: 1; padding: 14px 10px; border-radius: 10px; border: 2px solid #d4b896;
    background: #fff; font-family: "EB Garamond", serif; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; text-align: center; color: #7a6a50;
    transition: all 0.2s; line-height: 1.4;
  }
  .mode-btn.active { background: #2d5016; color: #fff; border-color: #2d5016; }
  .mode-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }

  /* Form card */
  .card { background: #fff; border-radius: 14px; padding: 24px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #d4b896; }
  .form-group { margin-bottom: 16px; }
  label { font-size: 0.78rem; color: #7a6a50; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 5px; }
  input[type="text"], input[type="tel"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #d4b896;
    border-radius: 7px; font-family: "EB Garamond", serif; font-size: 1rem; outline: none;
  }
  input:focus { border-color: #2d5016; }
  .file-input {
    width: 100%; padding: 10px; border: 1.5px dashed #d4b896;
    border-radius: 7px; background: #fffdf7; font-family: "EB Garamond", serif; font-size: 0.95rem;
  }
  .photo-preview { display: none; margin-top: 8px; }
  .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid #d4b896; }

  .btn-generate {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: #2d5016; color: #fff; font-family: "EB Garamond", serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 4px;
  }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-download {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: #e8671a; color: #fff; font-family: "EB Garamond", serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 10px; display: none;
  }
  .err { color: #c0392b; font-size: 0.85rem; margin-top: 8px; display: none; padding: 8px 12px; background: #fdecea; border-radius: 6px; }

  /* Output */
  .output { max-width: 500px; margin: 20px auto 0; display: none; text-align: center; }
  .output canvas { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<h1>🌿 VSD Poster Generator</h1>
<div class="sub">Vardhman Sanskar Dham — Jivdaya Abhiyan 2026</div>

<!-- Mode Selector -->
<div class="mode-btns">
  <button class="mode-btn active" onclick="switchMode('donor', this)">
    <span class="icon">🏅</span>Proud Donor<br>Poster
  </button>
  <button class="mode-btn" onclick="switchMode('appeal', this)">
    <span class="icon">📢</span>Jivdaya Appeal<br>Poster
  </button>
</div>

<!-- DONOR POSTER PANEL -->
<div class="panel active" id="panel-donor">
  <div class="card">
    <div class="form-group">
      <label>Donor Name *</label>
      <input type="text" id="donor-name" placeholder="e.g. Pradipbhai Mehta">
    </div>
    <div class="form-group">
      <label>Donor Photo *</label>
      <input type="file" class="file-input" id="donor-photo" accept="image/*" onchange="previewPhoto(this,'donor-preview')">
      <div class="photo-preview" id="donor-preview"><img id="donor-preview-img"></div>
    </div>
    <div class="err" id="donor-err"></div>
    <button class="btn-generate" onclick="generate('donor')">🎨 Generate Poster</button>
  </div>
</div>

<!-- APPEAL POSTER PANEL -->
<div class="panel" id="panel-appeal">
  <div class="card">
    <div class="form-group">
      <label>Volunteer / Donor Name *</label>
      <input type="text" id="appeal-name" placeholder="e.g. Pradipbhai Mehta">
    </div>
    <div class="form-group">
      <label>Contact Number *</label>
      <input type="tel" id="appeal-contact" placeholder="e.g. 9876543210" maxlength="10">
    </div>
    <div class="err" id="appeal-err"></div>
    <button class="btn-generate" onclick="generate('appeal')">🎨 Generate Poster</button>
  </div>
</div>

<!-- Output (shared) -->
<div class="output" id="output">
  <canvas id="poster-canvas"></canvas>
  <button class="btn-download" id="btn-download" onclick="download()">⬇️ Download Poster</button>
</div>

<script>
// ══════════════════════════════
//  TEMPLATES — update URLs after uploading to GitHub
// ══════════════════════════════
const TEMPLATES = {
  donor:  'https://vsddombivli.github.io/Digital_Receipt_System/donor_template.jpg',
  appeal: 'https://vsddombivli.github.io/Digital_Receipt_System/appeal_template.jpg',
};

// ══════════════════════════════
//  CONFIG — update after getting coordinates
// ══════════════════════════════
const CONFIG = {
  donor: {
    photo: { xPct:0.821, yPct:0.430, wPct:0.280, hPct:0.275, radius:6 },
    fields: [
      { id:'donor-name', xPct:0.821, yPct:0.608, fontPct:0.028, color:'#ffffff', maxWPct:0.26 },
    ],
  },
  appeal: {
    photo: null, // no photo for appeal poster
    fields: [
      { id:'appeal-name',    xPct:0.5, yPct:0.6,  fontPct:0.030, color:'#2d5016', maxWPct:0.7 },
      { id:'appeal-contact', xPct:0.5, yPct:0.68, fontPct:0.028, color:'#2d5016', maxWPct:0.7 },
    ],
  },
};

let currentMode = 'donor';
let donorPhotoImg = null;
let lastFilename = 'VSD_Poster';

function switchMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + mode).classList.add('active');
  document.getElementById('output').style.display = 'none';
  document.getElementById('btn-download').style.display = 'none';
}

function previewPhoto(input, previewId) {
  if (!input.files.length) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wrap = document.getElementById(previewId);
    wrap.querySelector('img').src = e.target.result;
    wrap.style.display = 'block';
    const img = new Image();
    img.onload = () => { donorPhotoImg = img; };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function generate(mode) {
  const cfg = CONFIG[mode];
  const errId = mode + '-err';

  // Validate
  if (mode === 'donor') {
    const name = document.getElementById('donor-name').value.trim();
    if (!name) { showErr(errId, 'Enter donor name'); return; }
    if (!donorPhotoImg) { showErr(errId, 'Upload donor photo'); return; }
    lastFilename = 'VSD_Donor_' + name.replace(/\s+/g,'_');
  } else {
    const name = document.getElementById('appeal-name').value.trim();
    const contact = document.getElementById('appeal-contact').value.trim();
    if (!name) { showErr(errId, 'Enter name'); return; }
    if (!contact) { showErr(errId, 'Enter contact number'); return; }
    lastFilename = 'VSD_Appeal_' + name.replace(/\s+/g,'_');
  }

  // Load template
  const tmpl = new Image();
  tmpl.crossOrigin = 'anonymous';
  await new Promise((res, rej) => {
    tmpl.onload = res;
    tmpl.onerror = () => rej('Template image not found. Upload to GitHub first.');
    tmpl.src = TEMPLATES[mode] + '?t=' + Date.now();
  }).catch(e => { showErr(errId, e); throw e; });

  const canvas = document.getElementById('poster-canvas');
  const ctx = canvas.getContext('2d');
  const W = tmpl.naturalWidth, H = tmpl.naturalHeight;
  canvas.width = W; canvas.height = H;
  ctx.drawImage(tmpl, 0, 0, W, H);

  // Draw photo if needed
  if (cfg.photo && donorPhotoImg) {
    const p = cfg.photo;
    const pw = W*p.wPct, ph = H*p.hPct;
    const px = W*p.xPct - pw/2, py = H*p.yPct - ph/2;
    ctx.save();
    roundRect(ctx, px, py, pw, ph, p.radius); ctx.clip();
    const scale = Math.max(pw/donorPhotoImg.width, ph/donorPhotoImg.height);
    const sw = pw/scale, sh = ph/scale;
    const sx = (donorPhotoImg.width-sw)/2, sy = (donorPhotoImg.height-sh)/2;
    ctx.drawImage(donorPhotoImg, sx, sy, sw, sh, px, py, pw, ph);
    ctx.restore();
  }

  // Draw text fields
  for (const f of cfg.fields) {
    const val = document.getElementById(f.id).value.trim();
    if (!val) continue;
    const fs = Math.round(W * f.fontPct);
    ctx.font = `bold ${fs}px "EB Garamond", serif`;
    ctx.fillStyle = f.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    wrapText(ctx, val, W*f.xPct, H*f.yPct, W*f.maxWPct, fs*1.35);
  }

  document.getElementById('output').style.display = 'block';
  document.getElementById('btn-download').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function download() {
  const a = document.createElement('a');
  a.download = lastFilename + '.png';
  a.href = document.getElementById('poster-canvas').toDataURL('image/png');
  a.click();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lh) {
  const words=text.split(' '); let line=''; const lines=[];
  for (let w of words) {
    const t = line+(line?' ':'')+w;
    if (ctx.measureText(t).width>maxW && line) { lines.push(line); line=w; } else line=t;
  }
  if (line) lines.push(line);
  const sy = y - ((lines.length-1)*lh)/2;
  lines.forEach((l,i) => ctx.fillText(l, x, sy+i*lh));
}
</script>
</body>
</html>
