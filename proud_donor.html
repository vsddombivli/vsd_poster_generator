<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSD Proud Donor Poster</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fdf6e3; font-family: "EB Garamond", serif; min-height: 100vh; padding: 20px 16px; }
  h1 { text-align: center; color: #2d5016; font-size: 1.4rem; margin-bottom: 4px; }
  .sub { text-align: center; color: #7a6a50; font-size: 0.85rem; font-style: italic; margin-bottom: 20px; }

  .card {
    background: #fff; border-radius: 14px; padding: 24px;
    max-width: 500px; margin: 0 auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #d4b896;
  }
  .form-group { margin-bottom: 16px; }
  label {
    font-size: 0.78rem; color: #7a6a50; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px;
    display: block; margin-bottom: 5px;
  }
  input[type="text"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #d4b896;
    border-radius: 7px; font-family: "EB Garamond", serif; font-size: 1rem; outline: none;
  }
  input[type="text"]:focus { border-color: #2d5016; }
  .file-input {
    width: 100%; padding: 10px; border: 1.5px dashed #d4b896;
    border-radius: 7px; background: #fffdf7;
    font-family: "EB Garamond", serif; font-size: 0.95rem;
  }
  .photo-preview { display: none; margin-top: 8px; }
  .photo-preview img {
    width: 80px; height: 80px; object-fit: cover;
    border-radius: 6px; border: 2px solid #d4b896;
  }
  .btn-generate {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: #2d5016; color: #fff; font-family: "EB Garamond", serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 4px;
  }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-download {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: #e8671a; color: #fff; font-family: "EB Garamond", serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 10px; display: none;
  }
  .err {
    color: #c0392b; font-size: 0.85rem; margin-top: 8px; display: none;
    padding: 8px 12px; background: #fdecea; border-radius: 6px;
  }
  .output { max-width: 500px; margin: 20px auto 0; display: none; text-align: center; }
  .output canvas { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
</style>
</head>
<body>

<h1>🏅 Proud Donor Poster</h1>
<div class="sub">Vardhman Sanskar Dham — Jivdaya Abhiyan 2026</div>

<div class="card">
  <div class="form-group">
    <label>Donor Name *</label>
    <input type="text" id="donor-name" placeholder="e.g. Pradipbhai Mehta">
  </div>
  <div class="form-group">
    <label>Donor Photo *</label>
    <input type="file" class="file-input" id="donor-photo" accept="image/*" onchange="previewPhoto(this)">
    <div class="photo-preview" id="donor-preview">
      <img id="donor-preview-img">
    </div>
   <!-- ADD THIS -->
   <div id="crop-control" style="display:none; margin-top:10px">
    <label>Position Vertical (Top ↕ Bottom)</label>
    <input type="range" min="0" max="100" value="20"
      style="width:100%"
      oninput="photoOffsetY = this.value/100"
      onchange="generate()">
    <label style="margin-top:8px;display:block">Position Horizontal (Left ↔ Right)</label>
    <input type="range" min="0" max="100" value="50"
      style="width:100%"
      oninput="photoOffsetX = this.value/100"
      onchange="generate()">
  </div>
  </div>
  <div class="form-group" id="font-size-group" style="display:none">
    <label>Name Font Size: <span id="font-size-val">3.4</span>%</label>
    <input type="range" id="font-size-slider" min="1.5" max="6" step="0.1" value="3.4"
      style="width:100%;accent-color:#2d5016;"
      oninput="document.getElementById('font-size-val').textContent=this.value"
      onchange="generate()">
  </div>
  <div class="err" id="donor-err"></div>
  <button class="btn-generate" onclick="generate()">🎨 Generate Poster</button>
</div>

<div class="output" id="output">
  <canvas id="poster-canvas"></canvas>
  <button class="btn-download" id="btn-download" onclick="download()">⬇️ Download Poster</button>
</div>

<script>
// ══════════════════════════════
//  CONFIG — update URL after uploading template to GitHub
// ══════════════════════════════
const TEMPLATE_URL = 'https://vsddombivli.github.io/vsd_poster_generator/proud_donor_template.jpg';

// ── Donor photo position on template (adjust after seeing result) ──
// These are PERCENTAGE values of template dimensions for easy scaling
const PHOTO_CONFIG = {
  xPct:   0.702,
  yPct:   0.401,  // up from 0.430
  wPct:   0.385,
  hPct:   0.321,
  radius: 0,
};

const NAME_CONFIG = {
  xPct:    0.495,
  yPct:    0.660,  // up slightly into box
  fontPct: 0.034,
  color:   '#4a1500',  // dark brown to match template
  maxWPct: 0.48,
};

// ══════════════════════════════

let donorPhotoImg = null;
let lastFilename = 'VSD_Donor_Poster';
// Add these variables
let photoOffsetY = 0; // 0 = top, 1 = bottom
let photoOffsetX = 0; // 0 = left, 1 = right (default center)
function previewPhoto(input) {
  if (!input.files.length) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('donor-preview-img').src = e.target.result;
    document.getElementById('donor-preview').style.display = 'block';
    const img = new Image();
    img.onload = () => { 
     donorPhotoImg = img; 
     document.getElementById('crop-control').style.display = 'block'; // ADD THIS 
     document.getElementById('font-size-group').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function showErr(msg) {
  const el = document.getElementById('donor-err');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function generate() {
  const name = document.getElementById('donor-name').value.trim();
  if (!name) { showErr('Enter donor name'); return; }
  if (!donorPhotoImg) { showErr('Upload donor photo'); return; }

  lastFilename = 'VSD_Donor_' + name.replace(/\s+/g, '_');

  // Wait for font to load before drawing
  await document.fonts.ready;

  // Fetch template as blob so canvas never gets cross-origin tainted
  // (GitHub Pages doesn't send CORS headers, so crossOrigin='anonymous' would
  //  taint the canvas and break toDataURL on download)
  let tmplBlobUrl;
  try {
    const resp = await fetch(TEMPLATE_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const blob = await resp.blob();
    tmplBlobUrl = URL.createObjectURL(blob);
  } catch (e) {
    showErr('Template image failed to load. Check the GitHub URL is correct and the file is published.');
    throw e;
  }
  const tmpl = await new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('Blob image load failed'));
    img.src = tmplBlobUrl;
  });

  const canvas = document.getElementById('poster-canvas');
  const ctx = canvas.getContext('2d');
  const W = tmpl.naturalWidth, H = tmpl.naturalHeight;
  canvas.width = W;
  canvas.height = H;
  ctx.drawImage(tmpl, 0, 0, W, H);

  // Draw photo
  const p = PHOTO_CONFIG;
  const pw = W * p.wPct, ph = H * p.hPct;
  const px = W * p.xPct - pw / 2, py = H * p.yPct - ph / 2;
  ctx.save();
  roundRect(ctx, px, py, pw, ph, p.radius);
  ctx.clip();
  //const scale = Math.max(pw / donorPhotoImg.width, ph / donorPhotoImg.height);
  //const sw = pw / scale, sh = ph / scale;
  //const sx = (donorPhotoImg.width - sw) / 2;
  //const sy = 0; // crop from top instead of center — keeps face visible
  const scale = Math.max(pw / donorPhotoImg.width, ph / donorPhotoImg.height);
  const sw = pw / scale, sh = ph / scale;
  const sx = (donorPhotoImg.width - sw) * photoOffsetX;
  const sy = (donorPhotoImg.height - sh) * photoOffsetY; 
 ctx.drawImage(donorPhotoImg, sx, sy, sw, sh, px, py, pw, ph);
  ctx.restore();

  // Draw name
  const n = NAME_CONFIG;
  const sliderVal = parseFloat(document.getElementById('font-size-slider').value) / 100;
  const fs = Math.round(W * sliderVal);
  ctx.font = `bold ${fs}px "EB Garamond", serif`;
  ctx.fillStyle = n.color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  wrapText(ctx, name, W * n.xPct, H * n.yPct, W * n.maxWPct, fs * 1.35);

  URL.revokeObjectURL(tmplBlobUrl); // free memory

  document.getElementById('output').style.display = 'block';
  document.getElementById('btn-download').style.display = 'block';
  // document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function download() {
  const a = document.createElement('a');
  a.download = lastFilename + '.png';
  a.href = document.getElementById('poster-canvas').toDataURL('image/png');
  a.click();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (let w of words) {
    const t = line + (line ? ' ' : '') + w;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  const sy = y - ((lines.length - 1) * lh) / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, sy + i * lh));
}
</script>
</body>
</html>
